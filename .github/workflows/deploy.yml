name: Deploy to ECS

on:
  push:
    branches: [main]

concurrency:
  group: ecs-deploy
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPO: crowd-map
  ECS_CLUSTER: crowd-map-cluster
  ECS_SERVICE: crowd-map-svc
  TASK_FAMILY: crowd-map-task
  CONTAINER: crowd-map
  MCP_CONTAINER: crowd-map-mcp
  PORT: "8765"
  MCP_PORT: "8000"
  CPU: "1024"
  MEMORY: "2048"
  ARCH: X86_64

permissions:
  id-token: write
  contents: read

jobs:
  push-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest

  deploy-ecs:
    needs: push-image
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Get image URI and role ARN
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          echo "IMAGE=${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}:${GITHUB_SHA}" >> "$GITHUB_ENV"
          ROLE_ARN=$(aws iam get-role --role-name ecsTaskExecutionRole --query 'Role.Arn' --output text)
          echo "ROLE_ARN=$ROLE_ARN" >> "$GITHUB_ENV"

      - name: Register new task definition
        run: |
          aws ecs register-task-definition \
            --family "$TASK_FAMILY" \
            --network-mode awsvpc \
            --requires-compatibilities FARGATE \
            --cpu "$CPU" --memory "$MEMORY" \
            --execution-role-arn "$ROLE_ARN" \
            --runtime-platform cpuArchitecture="$ARCH",operatingSystemFamily=LINUX \
            --container-definitions '[
              {
                "name": "'"$CONTAINER"'",
                "image": "'"$IMAGE"'",
                "command": ["python", "server.py"],
                "portMappings": [{"containerPort": '"$PORT"', "protocol": "tcp"}],
                "essential": true,
                "logConfiguration": {
                  "logDriver": "awslogs",
                  "options": {
                    "awslogs-group": "/ecs/'"$TASK_FAMILY"'",
                    "awslogs-region": "'"$AWS_REGION"'",
                    "awslogs-stream-prefix": "ecs"
                  }
                }
              },
              {
                "name": "'"$MCP_CONTAINER"'",
                "image": "'"$IMAGE"'",
                "command": ["python", "mcp_server.py"],
                "portMappings": [{"containerPort": '"$MCP_PORT"', "protocol": "tcp"}],
                "essential": false,
                "dependsOn": [
                  {"containerName": "'"$CONTAINER"'", "condition": "START"}
                ],
                "environment": [
                  {"name": "SIMULATION_URL", "value": "http://localhost:'"$PORT"'"}
                ],
                "logConfiguration": {
                  "logDriver": "awslogs",
                  "options": {
                    "awslogs-group": "/ecs/'"$TASK_FAMILY"'",
                    "awslogs-region": "'"$AWS_REGION"'",
                    "awslogs-stream-prefix": "ecs"
                  }
                }
              }
            ]'

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "$TASK_FAMILY" \
            --force-new-deployment

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"
          echo "Deployment complete!"
