<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crowd Simulation – Budapest</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #111; }
  #map { width: 100vw; height: 100vh; }
  #overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1000; }
  #bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 1001;
    background: rgba(20,20,20,0.9); color: #ddd;
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; font-size: 13px;
  }
  #bar button {
    padding: 5px 14px; border: none; border-radius: 4px;
    font-size: 13px; font-weight: bold; cursor: pointer;
    background: #444; color: #fff; transition: background 0.15s;
  }
  #bar button:hover { background: #666; }
  #bar button.active { background: #1a7a3a; }
  #bar button.paused { background: #7a6a1a; }
  #status { flex: 1; }
</style>
</head>
<body>

<div id="map"></div>
<canvas id="overlay"></canvas>
<div id="bar">
  <button id="btn-start">▶ Start</button>
  <button id="btn-step">⏭ Step</button>
  <button id="btn-rewind">⏪ Rewind</button>
  <button id="btn-reset">↺ Reset</button>
  <span id="status">Loading...</span>
</div>

<script>
const RALLY = [47.48616316916723, 19.079061866933007]; // Nokia Skypark

// Map setup
const map = L.map('map', { zoomControl: true }).setView([47.4875, 19.0680], 15);
L.tileLayer(`${location.protocol}//${location.host}/{z}/{x}/{y}.png`, {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 15, minZoom: 15
}).addTo(map);

// Rally point marker
L.circleMarker(RALLY, { radius: 12, color: 'red', weight: 2, fill: false, dashArray: '5,4' })
  .bindTooltip('Nokia Skypark', { permanent: true, direction: 'top' })
  .addTo(map);

// Canvas overlay for group rendering
const canvas = document.getElementById('overlay');
const ctx    = canvas.getContext('2d');
const statusEl = document.getElementById('status');

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Color shifts from blue to red as group grows
function groupColor(count) {
  const t = Math.min(count / 60, 1);
  return `rgba(${Math.round(30+225*t)},${Math.round(180*(1-t))},${Math.round(220*(1-t))},0.75)`;
}

// Venue fill color: green -> yellow -> red based on occupancy ratio
function venueColor(occupied, capacity) {
  const t = Math.min(occupied / capacity, 1);
  if (t < 0.5) {
    // green -> yellow
    const r = Math.round(255 * (t * 2));
    return { fill: `rgba(${r},200,50,0.55)`, stroke: `rgba(${r},200,50,0.9)` };
  } else {
    // yellow -> red
    const r = 255;
    const g = Math.round(200 * (1 - (t - 0.5) * 2));
    return { fill: `rgba(${r},${g},30,0.55)`, stroke: `rgba(${r},${g},30,0.9)` };
  }
}

function drawHex(x, y, r) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 180 * (60 * i - 30);
    i === 0 ? ctx.moveTo(x + r * Math.cos(a), y + r * Math.sin(a))
            : ctx.lineTo(x + r * Math.cos(a), y + r * Math.sin(a));
  }
  ctx.closePath();
}

function drawVenues(venues) {
  for (const v of venues) {
    const p   = map.latLngToContainerPoint([v.lat, v.lng]);
    const r   = Math.round(10 + Math.sqrt(v.capacity) * 0.9);
    const c   = venueColor(v.occupied, v.capacity);
    const ratio = Math.min(v.occupied / v.capacity, 1);

    // Background hex
    drawHex(p.x, p.y, r);
    ctx.fillStyle = c.fill;
    ctx.fill();
    ctx.strokeStyle = c.stroke;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Occupancy fill: clip to hex, fill proportional slice from bottom
    if (ratio > 0) {
      ctx.save();
      drawHex(p.x, p.y, r - 1);
      ctx.clip();
      ctx.fillStyle = c.stroke.replace('0.9', '0.45');
      ctx.fillRect(p.x - r, p.y + r - ratio * r * 2, r * 2, r * 2);
      ctx.restore();
    }

    // Redraw hex border on top
    drawHex(p.x, p.y, r);
    ctx.strokeStyle = c.stroke;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Labels
    ctx.fillStyle = 'white';
    ctx.font = 'bold 10px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`${v.occupied}/${v.capacity}`, p.x, p.y);
    ctx.font = '9px Arial';
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillText(v.name, p.x, p.y + r + 9);
  }
}

function draw(data) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // Draw groups first (bottom layer)
  for (const g of data.groups) {
    const p = map.latLngToContainerPoint([g.lat, g.lng]);
    const r = g.radius;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = groupColor(g.count);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = 'white';
    ctx.font = `bold ${Math.max(10, Math.min(14, 8 + g.count * 0.2))}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(g.count, p.x, p.y);
  }
  // Draw venue hexagons on top
  if (data.venues) drawVenues(data.venues);
}

function updateStatus(data) {
  const phase = data.phase === 'wander' ? '🚶 Wandering' : '🏃 Rallying → Heroes\' Square';
  const state = data.running ? '' : ' ⏸';
  statusEl.textContent = `${phase}${state}   |   Groups: ${data.groups.length}   |   People: ${data.total}   |   Tick: ${data.tick}`;
  const btn = document.getElementById('btn-start');
  btn.textContent = data.running ? '⏸ Pause' : '▶ Start';
  btn.classList.toggle('active', data.running);
  btn.classList.toggle('paused', !data.running);
}

// Send control action to server
async function control(action) {
  try {
    const res  = await fetch('/api/control', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action })
    });
    const data = await res.json();
    draw(data);
    updateStatus(data);
  } catch(e) {
    statusEl.textContent = 'Server unreachable...';
  }
}

document.getElementById('btn-start').addEventListener('click', () => {
  const running = document.getElementById('btn-start').classList.contains('active');
  control(running ? 'stop' : 'start');
});
document.getElementById('btn-step').addEventListener('click',   () => control('step'));
document.getElementById('btn-rewind').addEventListener('click', () => control('rewind'));
document.getElementById('btn-reset').addEventListener('click',  () => control('reset'));

// Poll server for latest state
async function poll() {
  try {
    const res  = await fetch('/api/groups');
    const data = await res.json();
    draw(data);
    updateStatus(data);
  } catch(e) {
    statusEl.textContent = 'Server unreachable...';
  }
  setTimeout(poll, 100);
}

map.whenReady(poll);
</script>
</body>
</html>
