<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crowd Simulation – Budapest</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #111; }
  #map { width: 100vw; height: 100vh; }
  #overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1000; }
  #bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 1001;
    background: rgba(20,20,20,0.9); color: #ddd;
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; font-size: 13px;
  }
  #bar button {
    padding: 5px 14px; border: none; border-radius: 4px;
    font-size: 13px; font-weight: bold; cursor: pointer;
    background: #444; color: #fff; transition: background 0.15s;
  }
  #bar button:hover { background: #666; }
  #bar button.active { background: #1a7a3a; }
  #bar button.paused { background: #7a6a1a; }
  #status { flex: 1; }
</style>
</head>
<body>

<div id="map"></div>
<canvas id="overlay"></canvas>
<div id="bar">
  <button id="btn-start">▶ Start</button>
  <button id="btn-step">⏭ Step</button>
  <button id="btn-rewind">⏪ Rewind</button>
  <button id="btn-reset">↺ Reset</button>
  <span id="status">Loading...</span>
</div>

<script>
const RALLY = [47.48616316916723, 19.079061866933007]; // Nokia Skypark

// Map setup
const map = L.map('map', { zoomControl: true }).setView([47.479, 19.0680], 15);
L.tileLayer(`${location.protocol}//${location.host}/{z}/{x}/{y}.png`, {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 15, minZoom: 15
}).addTo(map);

// Rally point markers
L.circleMarker([47.48616316916723, 19.079061866933007], { radius: 12, color: '#0064A0', weight: 2, fill: false, dashArray: '5,4' })
  .bindTooltip('Nokia Skypark', { permanent: true, direction: 'top' })
  .addTo(map);
L.circleMarker([47.47132533866037, 19.06329047791874], { radius: 12, color: '#003CC8', weight: 2, fill: false, dashArray: '5,4' })
  .bindTooltip('Ericsson', { permanent: true, direction: 'top' })
  .addTo(map);

const canvas = document.getElementById('overlay');
const ctx    = canvas.getContext('2d');
const statusEl = document.getElementById('status');

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const NOKIA_RALLY_NODE    = '6782272690';
const ERICSSON_RALLY_NODE = '9921293897';

let nokiaZone = null, ericssonZone = null;

async function loadZones() {
  const [nz, ez] = await Promise.all([
    fetch('/nokia_zone.json').then(r => r.json()),
    fetch('/ericsson_zone.json').then(r => r.json())
  ]);
  nokiaZone    = nz;
  ericssonZone = ez;
}

// Draw zone streets filled from centre outward based on arrived count
function drawZone(zone, arrived, totalForZone) {
  if (!zone) return;
  const segs = zone.segments;  // sorted by d ascending
  // How many metres of street are filled?
  // Each person occupies ~1.5m of street length
  const filledLen = arrived * 1.5;
  let cumLen = 0;
  for (const s of segs) {
    const pa = map.latLngToContainerPoint(s.a);
    const pb = map.latLngToContainerPoint(s.b);
    const prevCum = cumLen;
    cumLen += s.len;
    const t = Math.min(cumLen / Math.max(filledLen, 1), 1);
    const filled = cumLen <= filledLen;  // fully filled segment
    const partial = !filled && prevCum < filledLen;  // partially filled

    if (!filled && !partial) {
      // Empty street — dim grey
      ctx.beginPath(); ctx.moveTo(pa.x, pa.y); ctx.lineTo(pb.x, pb.y);
      ctx.strokeStyle = 'rgba(80,80,80,0.35)';
      ctx.lineWidth = 1.5; ctx.stroke();
      continue;
    }

    // Colour by distance from centre: close=red, mid=orange/yellow, far=green
    const dRatio = s.d / zone.radius;  // 0=centre, 1=edge
    const r = dRatio < 0.5 ? 255 : Math.round(255 * (1 - (dRatio - 0.5) * 1.2));
    const g = Math.round(60 + 160 * dRatio);
    const alpha = filled ? 0.9 : 0.5;
    ctx.beginPath(); ctx.moveTo(pa.x, pa.y); ctx.lineTo(pb.x, pb.y);
    ctx.strokeStyle = `rgba(${r},${g},20,${alpha})`;
    ctx.lineWidth = filled ? 3.5 : 2; ctx.stroke();
  }
}

// Venue fill color: green -> yellow -> red based on occupancy ratio
function venueColor(occupied, capacity) {
  const t = Math.min(occupied / capacity, 1);
  const r = Math.round(50 + 205 * t);
  const g = Math.round(220 * (1 - t));
  return { fill: `rgba(${r},${g},40,0.6)`, stroke: `rgba(${r},${g},40,1.0)` };
}

function drawHex(x, y, r) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 3 * i - Math.PI / 6;
    i === 0 ? ctx.moveTo(x + r * Math.cos(a), y + r * Math.sin(a))
            : ctx.lineTo(x + r * Math.cos(a), y + r * Math.sin(a));
  }
  ctx.closePath();
}

function drawVenues(venues) {
  for (const v of venues) {
    const p     = map.latLngToContainerPoint([v.lat, v.lng]);
    const r     = Math.round(12 + Math.sqrt(v.capacity) * 0.85);
    const c     = venueColor(v.occupied, v.capacity);
    const ratio = Math.min(v.occupied / v.capacity, 1);

    // Background hex (dark)
    drawHex(p.x, p.y, r);
    ctx.fillStyle = 'rgba(20,20,20,0.7)';
    ctx.fill();

    // Occupancy fill from bottom, clipped to hex shape
    if (ratio > 0) {
      ctx.save();
      drawHex(p.x, p.y, r);
      ctx.clip();
      ctx.fillStyle = c.fill;
      ctx.fillRect(p.x - r, p.y + r * (1 - ratio * 2), r * 2, r * 2 * ratio);
      ctx.restore();
    }

    // Hex border
    drawHex(p.x, p.y, r);
    ctx.strokeStyle = c.stroke;
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // occupancy / capacity text
    ctx.fillStyle = 'white';
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`${v.occupied}/${v.capacity}`, p.x, p.y);

    // venue name below hex
    ctx.font = '9px Arial';
    ctx.fillStyle = 'rgba(255,255,200,0.95)';
    ctx.fillText(v.name, p.x, p.y + r + 10);
  }
}

function draw(data) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Fill streets based on arrived counts
  const arrived = data.arrived || {};
  drawZone(nokiaZone,    arrived[NOKIA_RALLY_NODE]    || 0, data.total_spawned * 0.65);
  drawZone(ericssonZone, arrived[ERICSSON_RALLY_NODE] || 0, data.total_spawned * 0.35);

  // Draw still-moving groups
  for (const g of data.groups) {
    const p = map.latLngToContainerPoint([g.lat, g.lng]);
    const r = g.radius;
    const isNokia = g.rally_node === NOKIA_RALLY_NODE;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = isNokia ? 'rgba(0,120,200,0.82)' : 'rgba(0,60,200,0.82)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = 'white';
    ctx.font = `bold ${Math.max(10, Math.min(14, 8 + g.count * 0.2))}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(g.count, p.x, p.y);
  }

  if (data.venues) drawVenues(data.venues);
}

function updateStatus(data) {
  const phase = data.phase === 'wander' ? '🚶 Wandering' : '🏃 Rallying';
  const state = data.running ? '' : ' ⏸';
  statusEl.textContent = `${phase}${state}   |   Groups: ${data.groups.length}   |   People: ${data.total}   |   Tick: ${data.tick}`;
  const btn = document.getElementById('btn-start');
  btn.textContent = data.running ? '⏸ Pause' : '▶ Start';
  btn.classList.toggle('active', data.running);
  btn.classList.toggle('paused', !data.running);
}

async function control(action) {
  try {
    const res  = await fetch('/api/control', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action })
    });
    const data = await res.json();
    draw(data);
    updateStatus(data);
  } catch(e) {
    statusEl.textContent = 'Server unreachable...';
  }
}

document.getElementById('btn-start').addEventListener('click', () => {
  const running = document.getElementById('btn-start').classList.contains('active');
  control(running ? 'stop' : 'start');
});
document.getElementById('btn-step').addEventListener('click',   () => control('step'));
document.getElementById('btn-rewind').addEventListener('click', () => control('rewind'));
document.getElementById('btn-reset').addEventListener('click',  () => control('reset'));

async function poll() {
  try {
    const res  = await fetch('/api/groups');
    const data = await res.json();
    draw(data);
    updateStatus(data);
  } catch(e) {
    statusEl.textContent = 'Server unreachable...';
  }
  setTimeout(poll, 100);
}

map.whenReady(async () => { await loadZones(); poll(); });
</script>
</body>
</html>
