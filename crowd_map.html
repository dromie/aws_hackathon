<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Tömeg szimuláció – Budapest</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #111; }
  #map { width: 100vw; height: 100vh; }
  #overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1000; }
  #status {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(20,20,20,0.85); color: #ddd;
    padding: 8px 16px; font-size: 14px; z-index: 1001;
  }
</style>
</head>
<body>

<div id="map"></div>
<canvas id="overlay"></canvas>
<div id="status">Betöltés...</div>

<script>
const RALLY = [47.5149, 18.5763];

const map = L.map('map', { zoomControl: true }).setView([47.5140, 18.5760], 15);
L.tileLayer('http://localhost:8765/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 15, minZoom: 15
}).addTo(map);

L.circleMarker(RALLY, { radius: 12, color: 'red', weight: 2, fill: false, dashArray: '5,4' })
  .bindTooltip('Gyülekezési pont', { permanent: true, direction: 'top' })
  .addTo(map);

const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function groupColor(count) {
  const t = Math.min(count / 60, 1);
  return `rgba(${Math.round(30+225*t)},${Math.round(180*(1-t))},${Math.round(220*(1-t))},0.75)`;
}

function draw(groups) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const g of groups) {
    const p = map.latLngToContainerPoint([g.lat, g.lng]);
    const r = g.radius;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = groupColor(g.count);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = 'white';
    ctx.font = `bold ${Math.max(10, Math.min(14, 8 + g.count * 0.2))}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(g.count, p.x, p.y);
  }
}

async function poll() {
  try {
    const res = await fetch('/api/groups');
    const data = await res.json();
    draw(data.groups);
    const phaseLabel = data.phase === 'wander' ? '🚶 Bolyongás...' : '🏃 Gyülekezés → Hősök tere';
    statusEl.textContent = `${phaseLabel}   |   Csoportok: ${data.groups.length}   |   Emberek összesen: ${data.total}`;
  } catch(e) {
    statusEl.textContent = 'Szerver nem elérhető...';
  }
  setTimeout(poll, 100);
}

map.whenReady(poll);
</script>
</body>
</html>
