<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crowd Simulation – Budapest</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #111; }
  #map { width: 100vw; height: 100vh; }
  #overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1000; }
  #bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 1001;
    background: rgba(20,20,20,0.9); color: #ddd;
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; font-size: 13px;
  }
  #bar button {
    padding: 5px 14px; border: none; border-radius: 4px;
    font-size: 13px; font-weight: bold; cursor: pointer;
    background: #444; color: #fff; transition: background 0.15s;
  }
  #bar button:hover { background: #666; }
  #bar button.active { background: #1a7a3a; }
  #bar button.paused { background: #7a6a1a; }
  #bar input[type=number] {
    width: 80px; padding: 4px 6px; border: 1px solid #555; border-radius: 4px;
    background: #2a2a2a; color: #ddd; font-size: 13px; text-align: center;
  }
  #bar label { font-size: 12px; color: #aaa; }
  #status { flex: 1; }
</style>
</head>
<body>

<div id="map"></div>
<canvas id="overlay"></canvas>
<div id="bar">
  <button id="btn-start">▶ Start</button>
  <button id="btn-step">⏭ Step</button>
  <button id="btn-rewind">⏪ Rewind</button>
  <button id="btn-reset">↺ Reset</button>
  <label>Emberek: <input type="number" id="inp-people" value="28800" min="1"></label>
  <label>Csoportok: <input type="number" id="inp-groups" value="720" min="1"></label>
  <span id="status">Loading...</span>
</div>

<script>
const RALLY = [47.48616316916723, 19.079061866933007]; // Nokia Skypark

// Map setup
const map = L.map('map', { zoomControl: true }).setView([47.479, 19.0680], 15);
L.tileLayer(`${location.protocol}//${location.host}/{z}/{x}/{y}.png`, {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 15, minZoom: 15
}).addTo(map);

// Rally point markers
L.circleMarker([47.48616316916723, 19.079061866933007], { radius: 12, color: '#0064A0', weight: 2, fill: false, dashArray: '5,4' })
  .bindTooltip('Nokia Skypark', { permanent: true, direction: 'top' })
  .addTo(map);
L.circleMarker([47.47132533866037, 19.06329047791874], { radius: 12, color: '#003CC8', weight: 2, fill: false, dashArray: '5,4' })
  .bindTooltip('Ericsson', { permanent: true, direction: 'top' })
  .addTo(map);

const canvas = document.getElementById('overlay');
const ctx    = canvas.getContext('2d');
const statusEl = document.getElementById('status');

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const NOKIA_RALLY_NODE    = '6782272690';
const ERICSSON_RALLY_NODE = '9921293897';

let nokiaZone = null, ericssonZone = null;
let towerNetwork = null;
let cdnNodes = [];

async function loadZones() {
  const [nz, ez, tn] = await Promise.all([
    fetch('/nokia_zone.json').then(r => r.json()),
    fetch('/ericsson_zone.json').then(r => r.json()),
    fetch('/tower_network.json').then(r => r.json())
  ]);
  nokiaZone    = nz;
  ericssonZone = ez;
  towerNetwork = tn;
}

// Draw zone streets filled from centre outward based on arrived count
function drawZone(zone, arrived, totalForZone) {
  if (!zone) return;
  const segs = zone.segments;  // sorted by d ascending
  // How many metres of street are filled?
  // Each person occupies ~1.5m of street length
  const filledLen = arrived * 1.5;
  let cumLen = 0;
  for (const s of segs) {
    const pa = map.latLngToContainerPoint(s.a);
    const pb = map.latLngToContainerPoint(s.b);
    const prevCum = cumLen;
    cumLen += s.len;
    const t = Math.min(cumLen / Math.max(filledLen, 1), 1);
    const filled = cumLen <= filledLen;  // fully filled segment
    const partial = !filled && prevCum < filledLen;  // partially filled

    if (!filled && !partial) {
      // Empty street — dim grey
      ctx.beginPath(); ctx.moveTo(pa.x, pa.y); ctx.lineTo(pb.x, pb.y);
      ctx.strokeStyle = 'rgba(80,80,80,0.35)';
      ctx.lineWidth = 1.5; ctx.stroke();
      continue;
    }

    // Colour by distance from centre: close=red, mid=orange/yellow, far=green
    const dRatio = s.d / zone.radius;  // 0=centre, 1=edge
    const r = dRatio < 0.5 ? 255 : Math.round(255 * (1 - (dRatio - 0.5) * 1.2));
    const g = Math.round(60 + 160 * dRatio);
    const alpha = filled ? 0.9 : 0.5;
    ctx.beginPath(); ctx.moveTo(pa.x, pa.y); ctx.lineTo(pb.x, pb.y);
    ctx.strokeStyle = `rgba(${r},${g},20,${alpha})`;
    ctx.lineWidth = filled ? 3.5 : 2; ctx.stroke();
  }
}

// Venue fill color: green -> yellow -> red based on occupancy ratio
function venueColor(occupied, capacity) {
  const t = Math.min(occupied / capacity, 1);
  const r = Math.round(50 + 205 * t);
  const g = Math.round(220 * (1 - t));
  return { fill: `rgba(${r},${g},40,0.6)`, stroke: `rgba(${r},${g},40,1.0)` };
}

function drawHex(x, y, r) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 3 * i - Math.PI / 6;
    i === 0 ? ctx.moveTo(x + r * Math.cos(a), y + r * Math.sin(a))
            : ctx.lineTo(x + r * Math.cos(a), y + r * Math.sin(a));
  }
  ctx.closePath();
}

function drawVenues(venues) {
  for (const v of venues) {
    const p     = map.latLngToContainerPoint([v.lat, v.lng]);
    const r     = Math.round(12 + Math.sqrt(v.capacity) * 0.85);
    const c     = venueColor(v.occupied, v.capacity);
    const ratio = Math.min(v.occupied / v.capacity, 1);

    // Background hex (dark)
    drawHex(p.x, p.y, r);
    ctx.fillStyle = 'rgba(20,20,20,0.7)';
    ctx.fill();

    // Occupancy fill from bottom, clipped to hex shape
    if (ratio > 0) {
      ctx.save();
      drawHex(p.x, p.y, r);
      ctx.clip();
      ctx.fillStyle = c.fill;
      ctx.fillRect(p.x - r, p.y + r * (1 - ratio * 2), r * 2, r * 2 * ratio);
      ctx.restore();
    }

    // Hex border
    drawHex(p.x, p.y, r);
    ctx.strokeStyle = c.stroke;
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // occupancy / capacity text
    ctx.fillStyle = 'white';
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`${v.occupied}/${v.capacity}`, p.x, p.y);

    // venue name below hex
    ctx.font = '9px Arial';
    ctx.fillStyle = 'rgba(255,255,200,0.95)';
    ctx.fillText(v.name, p.x, p.y + r + 10);
  }
}

function draw(data) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Fill streets based on arrived counts
  const arrived = data.arrived || {};
  drawZone(nokiaZone,    arrived[NOKIA_RALLY_NODE]    || 0, data.total_spawned * 0.65);
  drawZone(ericssonZone, arrived[ERICSSON_RALLY_NODE] || 0, data.total_spawned * 0.35);

  // Draw tower network topology
  if (towerNetwork && data.venues) {
    const byId = {};
    for (const v of data.venues) byId[v.id] = v;
    for (const e of towerNetwork.edges) {
      const a = byId[e.from], b = byId[e.to];
      if (!a || !b) continue;
      const pa = map.latLngToContainerPoint([a.lat, a.lng]);
      const pb = map.latLngToContainerPoint([b.lat, b.lng]);
      ctx.beginPath();
      ctx.moveTo(pa.x, pa.y);
      ctx.lineTo(pb.x, pb.y);
      ctx.strokeStyle = 'rgba(0,200,255,0.65)';
      ctx.lineWidth = 3.5;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();
    }
  }

  // Draw still-moving groups
  for (const g of data.groups) {
    const p = map.latLngToContainerPoint([g.lat, g.lng]);
    const isNokia = g.rally_node === NOKIA_RALLY_NODE;
    const t = Math.min(g.count / 60, 1);
    const radius = 5 + t * 8;
    const r  = isNokia ? Math.round(40  + 215 * t) : Math.round(40  +  20 * t);
    const gr = isNokia ? Math.round(120 +  80 * t) : Math.round(100 + 120 * t);
    const b  = isNokia ? 220                        : 255;
    ctx.beginPath();
    ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${gr},${b},0.88)`;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  if (data.venues) drawVenues(data.venues);

  // Draw CDN service node icons next to their towers
  if (cdnNodes.length && data.venues) {
    const byId = {};
    for (const v of data.venues) byId[v.id] = v;
    for (const cdn of cdnNodes) {
      const v = byId[cdn.towerId];
      if (!v) continue;
      const p = map.latLngToContainerPoint([v.lat, v.lng]);
      const hr = Math.round(12 + Math.sqrt(v.capacity) * 0.85);
      // Position: upper-right of hex
      const ix = p.x + hr + 8, iy = p.y - hr + 2;
      // Small server icon: rounded rect with lines
      const w = 18, h = 14;
      ctx.fillStyle = 'rgba(0,180,255,0.85)';
      ctx.strokeStyle = 'rgba(255,255,255,0.9)';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.roundRect(ix - w/2, iy - h/2, w, h, 3);
      ctx.fill(); ctx.stroke();
      // Two horizontal lines inside (server rack look)
      ctx.beginPath();
      ctx.moveTo(ix - w/2 + 3, iy - 2); ctx.lineTo(ix + w/2 - 3, iy - 2);
      ctx.moveTo(ix - w/2 + 3, iy + 2); ctx.lineTo(ix + w/2 - 3, iy + 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.7)';
      ctx.lineWidth = 1;
      ctx.stroke();
      // CDN label
      ctx.fillStyle = 'rgba(0,220,255,0.95)';
      ctx.font = 'bold 7px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(cdn.id, ix, iy + h/2 + 1);
    }
  }

  // Draw assignment edges: moving groups -> venue (sárga)
  // + arrived accumulation: rally point -> venue (narancs, vastagabb)
  if (data.venues) {
    const RALLY_COORDS = {
      [NOKIA_RALLY_NODE]:    [47.48616316916723, 19.079061866933007],
      [ERICSSON_RALLY_NODE]: [47.47132533866037, 19.06329047791874],
    };

    // 1. Mozgó csoportok -> venue vonalak
    if (data.assignments && data.groups) {
      const maxCount = Math.max(1, ...data.assignments.map(a => a.count));
      for (const a of data.assignments) {
        const g = data.groups[a.groupIndex];
        const v = data.venues.find(vn => vn.id === a.venueId);
        if (!g || !v) continue;
        const pFrom = map.latLngToContainerPoint([g.lat, g.lng]);
        const pTo   = map.latLngToContainerPoint([v.lat, v.lng]);
        const t = Math.min(a.count / maxCount, 1);
        ctx.beginPath(); ctx.moveTo(pFrom.x, pFrom.y); ctx.lineTo(pTo.x, pTo.y);
        ctx.strokeStyle = `rgba(255,220,50,${0.4 + 0.5 * t})`;
        ctx.lineWidth = 0.8 + t * 2; ctx.stroke();
      }
    }

    // 2. Megérkezett emberek: rally pont -> venue vonalak (narancs)
    const venueArr = data.venue_assignments || {};
    const maxArrived = Math.max(1, ...Object.values(venueArr).map(Number));
    for (const v of data.venues) {
      const arrived = venueArr[String(v.id)] || 0;
      if (arrived === 0) continue;
      // Melyik rally ponthoz tartozik? A venue-ba érkező emberek rally_node-ja
      // Közelebb lévő rally pontból húzzuk a vonalat
      const dNokia    = Math.hypot((v.lat-47.48616)*111000, (v.lng-19.07906)*74000);
      const dEricsson = Math.hypot((v.lat-47.47133)*111000, (v.lng-19.06329)*74000);
      const rCoords = dNokia < dEricsson ? RALLY_COORDS[NOKIA_RALLY_NODE] : RALLY_COORDS[ERICSSON_RALLY_NODE];
      const pFrom = map.latLngToContainerPoint(rCoords);
      const pTo   = map.latLngToContainerPoint([v.lat, v.lng]);
      const t = Math.min(arrived / maxArrived, 1);
      ctx.beginPath(); ctx.moveTo(pFrom.x, pFrom.y); ctx.lineTo(pTo.x, pTo.y);
      ctx.strokeStyle = `rgba(255,140,0,${0.55 + 0.4 * t})`;
      ctx.lineWidth = 1.5 + t * 4; ctx.stroke();
    }
  }
}

function updateStatus(data) {
  const phase = data.phase === 'wander' ? '🚶 Wandering' : '🏃 Rallying';
  const state = data.running ? '' : ' ⏸';
  statusEl.textContent = `${phase}${state}   |   Groups: ${data.groups.length}   |   People: ${data.total}   |   Tick: ${data.tick}`;
  const btn = document.getElementById('btn-start');
  btn.textContent = data.running ? '⏸ Pause' : '▶ Start';
  btn.classList.toggle('active', data.running);
  btn.classList.toggle('paused', !data.running);
}

async function control(action) {
  try {
    const res  = await fetch('/api/control', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action })
    });
    const data = await res.json();
    draw(data);
    updateStatus(data);
  } catch(e) {
    statusEl.textContent = 'Server unreachable...';
  }
}

document.getElementById('btn-start').addEventListener('click', () => {
  const running = document.getElementById('btn-start').classList.contains('active');
  control(running ? 'stop' : 'start');
});
document.getElementById('btn-step').addEventListener('click',   () => control('step'));
document.getElementById('btn-rewind').addEventListener('click', () => control('rewind'));
document.getElementById('btn-reset').addEventListener('click', () => {
  const people = parseInt(document.getElementById('inp-people').value) || 28800;
  const groups = parseInt(document.getElementById('inp-groups').value) || 720;
  fetch('/api/control', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'reset', people, groups })
  }).then(r => r.json()).then(data => { draw(data); updateStatus(data); });
});

let _cdnTick = 0;
async function poll() {
  try {
    const res  = await fetch('/api/groups');
    const data = await res.json();
    if (++_cdnTick % 30 === 1) // refresh CDN list every ~3s
      fetch('/api/cdn').then(r=>r.json()).then(n=>{cdnNodes=n;}).catch(()=>{});
    draw(data);
    updateStatus(data);
  } catch(e) {
    statusEl.textContent = 'Server unreachable...';
  }
  setTimeout(poll, 100);
}

map.whenReady(async () => { await loadZones(); poll(); });
</script>
</body>
</html>
